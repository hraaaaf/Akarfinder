name: Public Sitemap Seed Harvest

# MASS-ACQUISITION-FREE-ACCELERATION-1
# Free acquisition lane: robots.txt -> explicitly declared sitemap files ->
# strict listing URL patterns -> source_offer_seeds only. No listing page fetch,
# no paid API, no public listing write. Scheduled runs still require the same
# three production ingestion flags; manual dispatch defaults to dry-run.

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run or apply"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply

permissions:
  contents: read

concurrency:
  group: public-sitemap-seed-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout canonical workflow ref
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Harvest robots-declared public sitemaps
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENSERP_AUTOMATED_INGESTION_ENABLED: ${{ secrets.OPENSERP_AUTOMATED_INGESTION_ENABLED }}
          OPENSERP_INGESTION_WRITE_ENABLED: ${{ secrets.OPENSERP_INGESTION_WRITE_ENABLED }}
          OPENSERP_INGESTION_CRON_ENABLED: ${{ secrets.OPENSERP_INGESTION_CRON_ENABLED }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="apply"
          else
            MODE="${{ inputs.mode }}"
          fi
          if [ "$MODE" = "apply" ]; then
            npx tsx scripts/openserp/sitemap-registry-mass-harvest.ts --apply
            npx tsx scripts/openserp/reconcile-commoncrawl-seed-freshness.ts --apply
          else
            npx tsx scripts/openserp/sitemap-registry-mass-harvest.ts
            npx tsx scripts/openserp/reconcile-commoncrawl-seed-freshness.ts
          fi