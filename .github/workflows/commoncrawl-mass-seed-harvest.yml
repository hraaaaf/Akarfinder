name: Common Crawl Mass Seed Harvest

# CASABLANCA-MASS-ACQUISITION-V1
# COMMONCRAWL-FIRST-ACTIVATION-V1
# COMMONCRAWL-CDX-MIME-FIX-1
# COMMONCRAWL-FAILSOFT-CANARY-V1
# Historical URL-index metadata -> source_offer_seeds only -> exact freshness
# reconciliation. No WARC/page fetch, no direct source-site request, no public
# listing write. Scheduled/push activation runs apply only when the existing
# three production write gates are enabled; manual runs default to dry-run.

on:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/commoncrawl-mass-seed-harvest.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run or apply"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply

permissions:
  contents: read

concurrency:
  group: commoncrawl-mass-seed-harvest
  cancel-in-progress: false

jobs:
  harvest-and-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout canonical workflow ref
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve write mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "CC_APPLY=1" >> "$GITHUB_ENV"
          elif [ "${{ inputs.mode }}" = "apply" ]; then
            echo "CC_APPLY=1" >> "$GITHUB_ENV"
          else
            echo "CC_APPLY=0" >> "$GITHUB_ENV"
          fi

      - name: Harvest Common Crawl canary domains first
        env:
          COMMONCRAWL_MASS_MODE: canary
        run: npx tsx scripts/openserp/commoncrawl-registry-mass-harvest.ts

      - name: Import canary seeds immediately
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENSERP_AUTOMATED_INGESTION_ENABLED: ${{ secrets.OPENSERP_AUTOMATED_INGESTION_ENABLED }}
          OPENSERP_INGESTION_WRITE_ENABLED: ${{ secrets.OPENSERP_INGESTION_WRITE_ENABLED }}
          OPENSERP_INGESTION_CRON_ENABLED: ${{ secrets.OPENSERP_INGESTION_CRON_ENABLED }}
        shell: bash
        run: |
          set -e
          wc -l data/audits/raw-results/commoncrawl-registry-mass-seeds.jsonl || true
          if [ "$CC_APPLY" = "1" ]; then
            npx tsx scripts/openserp/ingest-commoncrawl-mass-seeds.ts --apply
          else
            npx tsx scripts/openserp/ingest-commoncrawl-mass-seeds.ts
          fi

      - name: Harvest remaining approved registry domains
        env:
          COMMONCRAWL_MASS_MODE: remainder
        run: npx tsx scripts/openserp/commoncrawl-registry-mass-harvest.ts

      - name: Import remainder seeds and reconcile exact freshness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENSERP_AUTOMATED_INGESTION_ENABLED: ${{ secrets.OPENSERP_AUTOMATED_INGESTION_ENABLED }}
          OPENSERP_INGESTION_WRITE_ENABLED: ${{ secrets.OPENSERP_INGESTION_WRITE_ENABLED }}
          OPENSERP_INGESTION_CRON_ENABLED: ${{ secrets.OPENSERP_INGESTION_CRON_ENABLED }}
        shell: bash
        run: |
          set -e
          wc -l data/audits/raw-results/commoncrawl-registry-mass-seeds.jsonl || true
          if [ "$CC_APPLY" = "1" ]; then
            npx tsx scripts/openserp/ingest-commoncrawl-mass-seeds.ts --apply
            npx tsx scripts/openserp/reconcile-commoncrawl-seed-freshness.ts --apply
          else
            npx tsx scripts/openserp/ingest-commoncrawl-mass-seeds.ts
            npx tsx scripts/openserp/reconcile-commoncrawl-seed-freshness.ts
          fi

      - name: Upload final harvest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commoncrawl-registry-mass-seeds
          path: data/audits/raw-results/commoncrawl-registry-mass-seeds.jsonl
          if-no-files-found: warn
          retention-days: 7
