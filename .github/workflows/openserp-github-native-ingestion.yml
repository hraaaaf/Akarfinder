name: OpenSERP Native Ingestion (GitHub-hosted)

# OPENSERP-GITHUB-NATIVE-INGESTION-INTEGRATION-1
# Runs the EXISTING orchestrator (lib/openserp-ingestion/run-orchestrator.ts,
# via scripts/openserp/run-ingestion-github-actions.ts) inside a GitHub
# Actions job, talking to a local OpenSERP Docker container in full
# browser mode (validated by OPENSERP-GITHUB-EPHEMERAL-RUNTIME-POC-1) --
# no Vercel involved. workflow_dispatch only, no schedule.
#
# Checks out fix/openserp-serverless-state-persistence explicitly (not
# this workflow's own ref) because that branch, not yet merged to main,
# holds the DB-call-timeout-safety and engine-error-diagnostics work this
# mission is required to preserve unmodified.
#
# Guardrails against an accidental write:
#   - mode defaults to dry-run (never writes, bypasses the flag gate)
#   - cron mode still requires OPENSERP_AUTOMATED_INGESTION_ENABLED,
#     OPENSERP_INGESTION_WRITE_ENABLED, and OPENSERP_INGESTION_CRON_ENABLED
#     to all be "true" secrets -- unset here, so even a mistaken cron
#     dispatch safely NOOPs.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (never writes) or cron (mirrors Production gate exactly)"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - cron

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix/openserp-serverless-state-persistence
        uses: actions/checkout@v4
        with:
          ref: fix/openserp-serverless-state-persistence

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Confirm Node version
        run: node -v

      - name: Install dependencies
        run: npm ci

      - name: Start OpenSERP (full browser mode, no --raw)
        run: |
          set -e
          T0=$(date +%s%3N)
          docker pull karust/openserp:latest
          docker run -d --name openserp -p 7070:7070 \
            karust/openserp:latest serve -a 0.0.0.0 -p 7070
          T1=$(date +%s%3N)
          echo "openserp_start_ms=$((T1-T0))" >> "$GITHUB_ENV"

      - name: Wait for OpenSERP /health
        run: |
          set -e
          T0=$(date +%s%3N)
          STATUS="unknown"
          for i in $(seq 1 60); do
            BODY=$(curl -s -m 3 http://127.0.0.1:7070/health || true)
            STATUS=$(echo "$BODY" | grep -o '"status":"[a-z]*"' | head -1 | cut -d'"' -f4)
            if [ "$STATUS" = "healthy" ]; then break; fi
            sleep 1
          done
          T1=$(date +%s%3N)
          echo "openserp_health_wait_ms=$((T1-T0))" >> "$GITHUB_ENV"
          echo "--- /health ---"
          echo "$BODY"
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::OpenSERP did not report healthy within 60s"
            docker logs openserp --tail 200 || true
            exit 1
          fi

      - name: Confirm Bing/DuckDuckGo/Ecosia reachable (no ingestion writes)
        run: |
          set -e
          BODY=$(curl -s -m 5 http://127.0.0.1:7070/mega/engines)
          echo "$BODY"
          for e in bing duckduckgo ecosia; do
            if ! echo "$BODY" | grep -q "\"name\":\"$e\""; then
              echo "::warning::engine '$e' not listed in /mega/engines"
            fi
          done

      # TEMPORARY diagnostic (not ingestion code) -- investigating "Invalid
      # path specified in request URL" from the first Node-24 dry-run.
      # Never prints the secret value itself, only structural facts about
      # it. Remove once the SUPABASE_URL issue is confirmed/resolved.
      - name: Diagnostic -- SUPABASE_URL structure (no secret values printed)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          node -e '
            const raw = process.env.SUPABASE_URL || "";
            const trimmed = raw.trim();
            const hasLeadingWs = /^\s/.test(raw);
            const hasTrailingWs = /\s$/.test(raw);
            const hasQuotes = raw.includes("\"") || raw.includes("\x27");
            let parseable = false;
            let protocol = null, hostname = null, pathname = null, hasQueryOrHash = false;
            try {
              const u = new URL(trimmed);
              parseable = true;
              protocol = u.protocol;
              hostname = u.hostname;
              pathname = u.pathname;
              hasQueryOrHash = Boolean(u.search || u.hash);
            } catch (e) {}
            console.log(JSON.stringify({
              url_parseable: parseable,
              protocol_seen: protocol,
              protocol_is_https: protocol === "https:",
              hostname: hostname,
              hostname_matches_supabase_co: hostname ? hostname.endsWith(".supabase.co") : false,
              pathname: pathname,
              has_leading_whitespace: hasLeadingWs,
              has_trailing_whitespace: hasTrailingWs,
              has_quote_characters: hasQuotes,
              has_query_or_hash: hasQueryOrHash,
              total_length: raw.length,
            }, null, 2));
          '

      - name: Diagnostic -- minimal read-only REST probe (status only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          TARGET_URL=$(node -e '
            try {
              console.log(new URL("/rest/v1/", process.env.SUPABASE_URL.trim()).toString());
            } catch (e) {
              console.log("");
            }
          ')
          if [ -z "$TARGET_URL" ]; then
            echo '{"http_status": null, "network_error": "SUPABASE_URL not parseable, target URL not constructed", "sanitized_host": null, "sanitized_path": null}'
          else
            export TARGET_URL
            SANITIZED_HOST=$(node -e 'console.log(new URL(process.env.TARGET_URL).hostname)')
            SANITIZED_PATH=$(node -e 'console.log(new URL(process.env.TARGET_URL).pathname)')
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -m 10 \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$TARGET_URL" 2>/tmp/curl_err.txt)
            CURL_EXIT=$?
            NETWORK_ERR=""
            if [ $CURL_EXIT -ne 0 ]; then
              NETWORK_ERR=$(head -c 300 /tmp/curl_err.txt)
            fi
            printf '{"http_status": "%s", "curl_exit_code": %s, "network_error": "%s", "sanitized_host": "%s", "sanitized_path": "%s"}\n' \
              "$HTTP_STATUS" "$CURL_EXIT" "$NETWORK_ERR" "$SANITIZED_HOST" "$SANITIZED_PATH"
          fi

      - name: Run ingestion entrypoint
        id: ingest
        env:
          OPENSERP_LOCAL_URL: http://127.0.0.1:7070
          # OPENSERP-GITHUB-NATIVE-TRANSPORT-1: non-sensitive configuration,
          # not credentials -- plain env values, not GitHub Secrets. Selects
          # the native karust/openserp HTTP contract (GET /{engine}/search)
          # instead of the Railway-adapter contract, and satisfies the
          # existing 3-flag async-feeder gate (openserp-policy.ts) so the
          # engine calls this container actually runs are no longer
          # rejected before ever reaching it.
          OPENSERP_TRANSPORT: native
          PUBLIC_INDEX_POC_ENABLED: "true"
          OPENSERP_ASYNC_FEEDER_ENABLED: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENSERP_AUTOMATED_INGESTION_ENABLED: ${{ secrets.OPENSERP_AUTOMATED_INGESTION_ENABLED }}
          OPENSERP_INGESTION_WRITE_ENABLED: ${{ secrets.OPENSERP_INGESTION_WRITE_ENABLED }}
          OPENSERP_INGESTION_CRON_ENABLED: ${{ secrets.OPENSERP_INGESTION_CRON_ENABLED }}
        run: |
          set -e
          T0=$(date +%s%3N)
          npx tsx scripts/openserp/run-ingestion-github-actions.ts --${{ inputs.mode }}
          T1=$(date +%s%3N)
          echo "ingest_ms=$((T1-T0))" >> "$GITHUB_ENV"

      - name: Timing summary
        if: always()
        run: |
          echo "openserp_start_ms=${{ env.openserp_start_ms }}"
          echo "openserp_health_wait_ms=${{ env.openserp_health_wait_ms }}"
          echo "ingest_ms=${{ env.ingest_ms }}"

      - name: Dump OpenSERP container logs (always, for diagnosis)
        if: always()
        run: docker logs openserp --tail 300 || true

      - name: Stop OpenSERP
        if: always()
        run: docker rm -f openserp || true
