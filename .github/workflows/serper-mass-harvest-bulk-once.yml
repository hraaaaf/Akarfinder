name: Serper 1900 Bulk Harvest Once

on:
  push:
    branches:
      - feat/serper-mass-harvest-implement-1
    paths:
      - ".github/workflows/serper-mass-harvest-bulk-once.yml"

permissions:
  contents: read

jobs:
  bulk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SERPER_MASS_HARVEST_ENABLED: "true"
      SERPER_MASS_HARVEST_BULK_APPLY: "true"
      SERPER_MASS_HARVEST_RUN_ID: "serper-bulk-1900-20260723-cycle1"
      SERPER_MASS_HARVEST_API_KEY: ${{ secrets.SEARCH_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate required secrets without printing them
        shell: bash
        run: |
          test -n "$SERPER_MASS_HARVEST_API_KEY" || { echo "SEARCH_API_KEY secret missing"; exit 2; }
          test -n "$SUPABASE_URL" || { echo "SUPABASE_URL secret missing"; exit 2; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "SUPABASE_SERVICE_ROLE_KEY secret missing"; exit 2; }
      - name: Execute checkpointed 1900-query bulk harvest and persist every result
        run: npx tsx scripts/serper-mass-harvest-bulk.ts | tee serper-bulk-1900-output.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serper-bulk-1900-cycle1
          path: serper-bulk-1900-output.json
          if-no-files-found: ignore
