name: Phase 1 P1 Search Truth Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  search-truth:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Search truth contracts
        run: npx tsx --test scripts/scrapers/__tests__/search-truth-tier.test.ts scripts/scrapers/__tests__/serp-gateway-first.test.ts scripts/scrapers/__tests__/search-ranking.test.ts scripts/scrapers/__tests__/public-result-similarity.test.ts scripts/scrapers/__tests__/akarinfo-passport.test.ts

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Production build rehearsal
        run: npm run build
