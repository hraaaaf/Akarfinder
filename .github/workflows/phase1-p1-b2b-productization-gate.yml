name: Phase 1 P1 B2B Productization Gate
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  b2b-productization:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: B2B productization contracts
        run: npx tsx --test scripts/scrapers/__tests__/phase1-p1-b2b-productization.test.ts
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Production build rehearsal
        run: npm run build
