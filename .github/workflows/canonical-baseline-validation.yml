name: Canonical Baseline Validation
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  roadmap_finalize:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'docs/roadmap-finalize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout roadmap finalizer branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Append Thin Index V2 roadmap closure once and restore workflow
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          roadmap = Path('docs/ROADMAP.md')
          text = roadmap.read_text(encoding='utf-8')
          marker = '## 2026-07-24 - THIN-INDEX-SEARCH-DEPTH-PAGINATION-1'
          if marker not in text:
              block = r'''

## 2026-07-24 - THIN-INDEX-SEARCH-DEPTH-PAGINATION-1 (COMPLETED - PR #74)

Etat:
- Mission terminee et validee en Production via PR #74, squash-merge commit `9139acf59acb8068b4a9587309d4daa1eaa67b44`.
- L ancienne fenetre applicative `.limit(1500)` n est plus le mecanisme de profondeur du Thin Index.
- `thin_index_search_documents` sert de projection searchable derivee de `source_offer_seeds` avec synchronisation par triggers.
- Recherche relevance-first via RPC `search_thin_index_v2`, Full-Text Search PostgreSQL + GIN, tokenisation des slugs URL, index structures et pagination keyset.
- Publication safety conservee : `accepted` uniquement vers le Thin Index/Gateway ; `rejected` et `unclassified` restent discovery-only.
- Deduplication des URLs deja structurees et equilibrage des sources conserves dans le Gateway.

Validation:
- CI finale PR #74 : 14/14 workflows PASS.
- Production : `29 071 / 29 071` seeds eligibles indexes dans la projection Thin Index.
- Seed historiquement situe au-dela de l ancienne fenetre (environ position 20 004) retrouve correctement.
- Keyset : page 1 = 20, page 2 = 20, overlap = 0, union = 40.
- Serper : `1 959 / 1 959` seeds publies avec preuve `accepted`; `4 710 rejected` et `5 899 unclassified` non publies.
- Benchmark RPC Production : environ `27.7 ms` pour 120 candidats `appartement + Casablanca + vente`.
- Qualite mesuree : Casablanca appartement vente `97 / 6 sources`; Rabat appartement location `146 / 6`; Marrakech villa vente `624 / 7`; long-tail `riad medina marrakech` `150 / 8`.

Decision roadmap:
- `THIN-INDEX-SEARCH-DEPTH-PAGINATION-1` = COMPLETED.
- PR de reference : `#74`.
- Le prochain travail DATA doit porter sur l augmentation du reservoir qualifie et la couverture 100K+, pas sur un nouvel accroissement arbitraire de `.limit()`.
'''
              roadmap.write_text(text.rstrip() + block + '\n', encoding='utf-8')

          original = subprocess.check_output([
              'git', 'show',
              '125dc330207c5cb11db0dfd8bbab2189ab76ce36:.github/workflows/canonical-baseline-validation.yml'
          ], text=True)
          Path('.github/workflows/canonical-baseline-validation.yml').write_text(original, encoding='utf-8')
      - name: Commit roadmap-only finalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ROADMAP.md .github/workflows/canonical-baseline-validation.yml
          if git diff --cached --quiet; then
            echo "No change required"
            exit 0
          fi
          git commit -m "docs(roadmap): record Thin Index V2 completion PR #74"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout candidate ref
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Canonical workflow governance guard
        run: npx tsx --test scripts/scrapers/__tests__/canonical-workflow-ref-guard.test.ts scripts/scrapers/__tests__/openserp-schedule-trigger-guard.test.ts
      - name: Scraper regression suite
        id: scraper_regression
        run: |
          set -o pipefail
          npm run test:scrapers 2>&1 | tee scraper-regression.log
      - name: Upload scraper regression diagnostics
        if: failure() && steps.scraper_regression.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: scraper-regression-failure
          path: scraper-regression.log
          if-no-files-found: error
          retention-days: 3
      - name: Analysis Contract V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/analysis-contract.test.ts
      - name: Unified structured intelligence pipeline suite
        run: npx tsx --test scripts/scrapers/__tests__/structured-listing-intelligence-pipeline.test.ts
      - name: Freshness and provenance V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/freshness-provenance-v2.test.ts
      - name: Market Intelligence V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/market-intelligence-v2.test.ts
      - name: Anomaly Engine V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/anomaly-engine-v1.test.ts
      - name: Multi-source Property Intelligence V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/multisource-property-intelligence-v1.test.ts
      - name: AkarScore V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/akar-score-v2.test.ts
      - name: Public SERP Intelligence V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/public-serp-intelligence-v1.test.ts
      - name: Property Detail V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/property-detail-v2.test.ts
      - name: Professional Auth Ownership Profiles V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/professional-auth-ownership-profiles-v1.test.ts
      - name: Partner Commercial Activation V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/partner-commercial-activation-v1.test.ts
      - name: Neighborhood Intelligence Reference V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/neighborhood-intelligence-reference-v2.test.ts
      - name: Dynamic Search Profile V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/dynamic-search-profile-v2.test.ts
      - name: Personalized Property Fit V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/personalized-property-fit-v1.test.ts
      - name: Compagnon AkarFinder State Machine V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/companion-state-machine-v1.test.ts scripts/scrapers/__tests__/companion-question-planner-v1.test.ts
      - name: Homepage & Search Entry Orchestration V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/home-search-entry-orchestration-v1.test.ts
      - name: User Continuity V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/user-continuity-v1.test.ts
      - name: Final Production Gate V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/final-production-gate-v1.test.ts
      - name: Data Mass Acquisition + Query Universe V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/data-mass-acquisition-query-universe-v2.test.ts
      - name: Casablanca Mass Acquisition V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/casablanca-mass-acquisition-v1.test.ts
      - name: Free Mass Acquisition Acceleration V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/free-mass-acquisition-acceleration-v1.test.ts
      - name: National Mass Acquisition All Morocco V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/national-mass-acquisition-all-morocco-v1.test.ts
      - name: Data Funnel Recovery V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/data-funnel-recovery-v1.test.ts
      - name: Mass Acquisition Campaign V2 suite
        run: npx tsx --test scripts/scrapers/__tests__/mass-acquisition-campaign-v2.test.ts
      - name: Search Index Depth V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/search-index-depth-v1.test.ts
      - name: Seed Listing Mass Conversion V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/seed-listing-mass-conversion-v1.test.ts
      - name: Thin Index Seed Search V1 suite
        run: npx tsx --test scripts/scrapers/__tests__/thin-index-seed-search-v1.test.ts
      - name: Vercel Phase Deployment Gate suite
        run: npx tsx --test scripts/scrapers/__tests__/vercel-phase-deployment-gate.test.ts
      - name: API regression suite
        run: npm run test:api
      - name: OpenSERP ingestion suite
        run: npm run test:openserp-ingestion
      - name: OpenSERP time-budget and lock safety suite
        run: npm run test:openserp-time-budget-and-lock-safety
      - name: Market Index suite
        run: npm run test:market-index
      - name: Seed freshness suite
        run: npm run test:seed-freshness
      - name: Dedup clustering V2 suite
        run: npm run test:dedup-clustering-v2
      - name: Index lifecycle suite
        run: npm run test:index-lifecycle
      - name: Direct feeds suite
        run: npm run test:direct-feeds
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
