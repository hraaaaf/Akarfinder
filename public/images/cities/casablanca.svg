<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cs-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020b18"/>
      <stop offset="30%" stop-color="#061525"/>
      <stop offset="65%" stop-color="#0d2848"/>
      <stop offset="100%" stop-color="#163860"/>
    </linearGradient>
    <linearGradient id="cs-ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102a50"/>
      <stop offset="100%" stop-color="#040e1c"/>
    </linearGradient>
    <radialGradient id="cs-moon" cx="70%" cy="20%" r="18%">
      <stop offset="0%" stop-color="#b8ccee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#061525" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cs-glow" cx="50%" cy="68%" r="35%">
      <stop offset="0%" stop-color="#1a4080" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d2848" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="800" fill="url(#cs-sky)"/>
  <rect width="600" height="800" fill="url(#cs-moon)"/>
  <rect width="600" height="800" fill="url(#cs-glow)"/>

  <!-- Stars -->
  <circle cx="48" cy="52" r="1.2" fill="#d0e0ff" opacity="0.65"/>
  <circle cx="130" cy="38" r="0.9" fill="#d0e0ff" opacity="0.55"/>
  <circle cx="200" cy="70" r="1.1" fill="#d0e0ff" opacity="0.60"/>
  <circle cx="270" cy="28" r="0.7" fill="#d0e0ff" opacity="0.50"/>
  <circle cx="160" cy="110" r="0.8" fill="#d0e0ff" opacity="0.45"/>
  <circle cx="60" cy="145" r="0.9" fill="#d0e0ff" opacity="0.40"/>
  <circle cx="510" cy="42" r="1.3" fill="#d0e0ff" opacity="0.70"/>
  <circle cx="555" cy="85" r="0.8" fill="#d0e0ff" opacity="0.50"/>
  <circle cx="480" cy="130" r="0.7" fill="#d0e0ff" opacity="0.40"/>
  <circle cx="90" cy="200" r="0.8" fill="#d0e0ff" opacity="0.35"/>
  <circle cx="340" cy="55" r="0.9" fill="#d0e0ff" opacity="0.45"/>

  <!-- Moon crescent -->
  <circle cx="415" cy="108" r="22" fill="#dde8f8" opacity="0.88"/>
  <circle cx="424" cy="102" r="17" fill="#040e1a" opacity="0.95"/>

  <!-- City skyline - low buildings left -->
  <rect x="0" y="575" width="55" height="55" fill="#050d1a"/>
  <rect x="48" y="555" width="42" height="75" fill="#060f1e"/>
  <rect x="84" y="568" width="38" height="62" fill="#050c18"/>
  <rect x="116" y="548" width="30" height="82" fill="#071220"/>

  <!-- Hassan II Mosque - central landmark -->
  <!-- Base platform -->
  <rect x="235" y="555" width="130" height="75" fill="#060d1c"/>
  <!-- Mosque body / arcades -->
  <rect x="245" y="520" width="110" height="40" fill="#07101f"/>
  <!-- Minaret base -->
  <rect x="288" y="340" width="24" height="180" fill="#080f20"/>
  <!-- Minaret main shaft -->
  <rect x="291" y="255" width="18" height="90" fill="#0a1328"/>
  <!-- Minaret cap -->
  <rect x="290" y="242" width="20" height="16" fill="#0d1832"/>
  <!-- Minaret finial -->
  <polygon points="286,245 314,245 300,218" fill="#102040"/>
  <rect x="296" y="214" width="8" height="14" fill="#142444"/>
  <polygon points="294,214 306,214 300,204" fill="#182848"/>
  <!-- Horizontal bands on minaret -->
  <rect x="291" y="310" width="18" height="2.5" fill="#1a3060" opacity="0.55"/>
  <rect x="291" y="360" width="18" height="2.5" fill="#1a3060" opacity="0.55"/>
  <rect x="291" y="410" width="18" height="2.5" fill="#1a3060" opacity="0.55"/>
  <!-- Windows (subtle lights) -->
  <rect x="296" y="330" width="8" height="5" fill="#2a4a8a" opacity="0.6"/>
  <rect x="296" y="385" width="8" height="5" fill="#2a4a8a" opacity="0.5"/>
  <rect x="296" y="440" width="8" height="5" fill="#2a4a8a" opacity="0.4"/>

  <!-- City skyline right -->
  <rect x="370" y="560" width="50" height="70" fill="#060e1c"/>
  <rect x="414" y="548" width="38" height="82" fill="#050c18"/>
  <rect x="446" y="558" width="45" height="72" fill="#060d1a"/>
  <rect x="484" y="545" width="40" height="85" fill="#070f1e"/>
  <rect x="518" y="560" width="82" height="70" fill="#050c18"/>

  <!-- Ocean -->
  <rect x="0" y="630" width="600" height="170" fill="url(#cs-ocean)"/>

  <!-- Moon reflection -->
  <ellipse cx="415" cy="648" rx="38" ry="7" fill="#b0c4e8" opacity="0.10"/>
  <ellipse cx="415" cy="665" rx="22" ry="4" fill="#b0c4e8" opacity="0.07"/>

  <!-- Wave lines -->
  <path d="M 0 658 Q 120 652 240 660 Q 360 668 480 660 Q 540 656 600 660" fill="none" stroke="#1c3a6a" stroke-width="1.2" opacity="0.25"/>
  <path d="M 0 690 Q 150 684 300 692 Q 450 700 600 692" fill="none" stroke="#1c3a6a" stroke-width="1" opacity="0.18"/>

  <!-- Minaret light reflection in water -->
  <ellipse cx="300" cy="648" rx="3" ry="18" fill="#2a4a90" opacity="0.12"/>
</svg>
