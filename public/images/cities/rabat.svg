<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rb-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020a1c"/>
      <stop offset="28%" stop-color="#071a38"/>
      <stop offset="60%" stop-color="#0e2e5c"/>
      <stop offset="100%" stop-color="#184a80"/>
    </linearGradient>
    <linearGradient id="rb-river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2a52"/>
      <stop offset="100%" stop-color="#040e20"/>
    </linearGradient>
    <radialGradient id="rb-moon" cx="72%" cy="18%" r="15%">
      <stop offset="0%" stop-color="#c0d4f0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#071a38" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rb-glow" cx="42%" cy="62%" r="30%">
      <stop offset="0%" stop-color="#184a80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0e2e5c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="800" fill="url(#rb-sky)"/>
  <rect width="600" height="800" fill="url(#rb-moon)"/>
  <rect width="600" height="800" fill="url(#rb-glow)"/>

  <!-- Stars -->
  <circle cx="55" cy="48" r="1.1" fill="#c8daf0" opacity="0.60"/>
  <circle cx="140" cy="32" r="0.8" fill="#c8daf0" opacity="0.50"/>
  <circle cx="195" cy="75" r="1.0" fill="#c8daf0" opacity="0.55"/>
  <circle cx="280" cy="25" r="0.7" fill="#c8daf0" opacity="0.45"/>
  <circle cx="165" cy="118" r="0.8" fill="#c8daf0" opacity="0.40"/>
  <circle cx="350" cy="58" r="0.9" fill="#c8daf0" opacity="0.48"/>
  <circle cx="505" cy="38" r="1.2" fill="#c8daf0" opacity="0.65"/>
  <circle cx="545" cy="80" r="0.8" fill="#c8daf0" opacity="0.48"/>
  <circle cx="90" cy="180" r="0.7" fill="#c8daf0" opacity="0.35"/>
  <circle cx="448" cy="105" r="0.8" fill="#c8daf0" opacity="0.40"/>

  <!-- Moon -->
  <circle cx="430" cy="105" r="20" fill="#dae6f8" opacity="0.85"/>
  <circle cx="439" cy="100" r="15.5" fill="#030b1a" opacity="0.95"/>

  <!-- Ramparts / Almohad walls - left section -->
  <rect x="0" y="572" width="200" height="58" fill="#060f22"/>
  <!-- Wall battlements -->
  <rect x="5" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="28" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="51" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="74" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="97" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="120" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="143" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="166" y="562" width="14" height="15" fill="#07112a"/>

  <!-- Hassan Tower - central landmark (incomplete minaret) -->
  <!-- Mosque base -->
  <rect x="200" y="540" width="200" height="90" fill="#060d20"/>
  <!-- Minaret main shaft (incomplete — top is flat, not tapered) -->
  <rect x="278" y="270" width="44" height="270" fill="#070f24"/>
  <!-- Unfinished top - flat cut -->
  <rect x="274" y="260" width="52" height="14" fill="#09132c"/>
  <!-- Horizontal decorative bands -->
  <rect x="278" y="318" width="44" height="3" fill="#1a3872" opacity="0.5"/>
  <rect x="278" y="368" width="44" height="3" fill="#1a3872" opacity="0.5"/>
  <rect x="278" y="418" width="44" height="3" fill="#1a3872" opacity="0.5"/>
  <rect x="278" y="468" width="44" height="3" fill="#1a3872" opacity="0.5"/>
  <!-- Decorative archway panels on minaret face -->
  <path d="M 292 350 Q 300 330 308 350 L 308 380 L 292 380 Z" fill="#091428" opacity="0.8"/>
  <path d="M 292 400 Q 300 380 308 400 L 308 430 L 292 430 Z" fill="#091428" opacity="0.8"/>
  <path d="M 292 450 Q 300 430 308 450 L 308 480 L 292 480 Z" fill="#091428" opacity="0.8"/>
  <!-- Window lights (subtle amber) -->
  <rect x="294" y="352" width="12" height="14" rx="6" fill="#3060b8" opacity="0.35"/>
  <rect x="294" y="402" width="12" height="14" rx="6" fill="#3060b8" opacity="0.30"/>
  <rect x="294" y="452" width="12" height="14" rx="6" fill="#3060b8" opacity="0.25"/>

  <!-- Palm trees around the tower -->
  <rect x="250" y="500" width="5" height="60" fill="#040e20"/>
  <path d="M 252 502 Q 228 482 218 464" fill="none" stroke="#07162e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 252 506 Q 240 492 234 480" fill="none" stroke="#07162e" stroke-width="3" stroke-linecap="round"/>
  <path d="M 252 502 Q 268 480 272 462" fill="none" stroke="#07162e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 252 504 Q 252 480 250 460" fill="none" stroke="#07162e" stroke-width="3" stroke-linecap="round"/>

  <rect x="348" y="508" width="5" height="52" fill="#040e20"/>
  <path d="M 350 510 Q 328 490 318 474" fill="none" stroke="#07162e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 350 510 Q 364 490 370 474" fill="none" stroke="#07162e" stroke-width="3" stroke-linecap="round"/>
  <path d="M 350 512 Q 362 498 368 488" fill="none" stroke="#07162e" stroke-width="3" stroke-linecap="round"/>
  <path d="M 350 510 Q 348 488 347 468" fill="none" stroke="#07162e" stroke-width="3" stroke-linecap="round"/>

  <!-- Wall continues right -->
  <rect x="400" y="572" width="200" height="58" fill="#060f22"/>
  <rect x="406" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="429" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="452" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="475" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="498" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="521" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="544" y="562" width="14" height="15" fill="#07112a"/>
  <rect x="567" y="562" width="14" height="15" fill="#07112a"/>

  <!-- Bouregreg river / Atlantic -->
  <rect x="0" y="630" width="600" height="170" fill="url(#rb-river)"/>

  <!-- Subtle river shimmer -->
  <path d="M 0 650 Q 150 644 300 652 Q 450 660 600 650" fill="none" stroke="#1a3870" stroke-width="1.2" opacity="0.22"/>
  <path d="M 0 682 Q 200 676 400 684 Q 500 688 600 682" fill="none" stroke="#1a3870" stroke-width="1" opacity="0.16"/>

  <!-- Tower reflection in water -->
  <ellipse cx="300" cy="644" rx="6" ry="20" fill="#2a52a0" opacity="0.12"/>
  <ellipse cx="300" cy="668" rx="3" ry="10" fill="#2a52a0" opacity="0.08"/>
</svg>
