<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tg-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="28%" stop-color="#061428"/>
      <stop offset="60%" stop-color="#0a2048"/>
      <stop offset="100%" stop-color="#103268"/>
    </linearGradient>
    <linearGradient id="tg-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c2448"/>
      <stop offset="100%" stop-color="#040e20"/>
    </linearGradient>
    <linearGradient id="tg-horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#103268" stop-opacity="0"/>
      <stop offset="40%" stop-color="#1a4888" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#1a4888" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#103268" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="tg-moon" cx="30%" cy="20%" r="16%">
      <stop offset="0%" stop-color="#b0c8e8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#061428" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tg-glow" cx="75%" cy="72%" r="30%">
      <stop offset="0%" stop-color="#1848a0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a2048" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="800" fill="url(#tg-sky)"/>
  <rect width="600" height="800" fill="url(#tg-moon)"/>
  <rect width="600" height="800" fill="url(#tg-glow)"/>
  <!-- Atmospheric horizon band -->
  <rect x="0" y="480" width="600" height="80" fill="url(#tg-horizon)"/>

  <!-- Stars -->
  <circle cx="65" cy="44" r="1.1" fill="#b8ccee" opacity="0.62"/>
  <circle cx="148" cy="28" r="0.8" fill="#b8ccee" opacity="0.52"/>
  <circle cx="210" cy="68" r="0.9" fill="#b8ccee" opacity="0.55"/>
  <circle cx="320" cy="22" r="0.7" fill="#b8ccee" opacity="0.45"/>
  <circle cx="172" cy="108" r="0.8" fill="#b8ccee" opacity="0.38"/>
  <circle cx="385" cy="50" r="1.0" fill="#b8ccee" opacity="0.50"/>
  <circle cx="448" cy="78" r="0.8" fill="#b8ccee" opacity="0.48"/>
  <circle cx="78" cy="162" r="0.7" fill="#b8ccee" opacity="0.35"/>
  <circle cx="510" cy="30" r="1.2" fill="#b8ccee" opacity="0.65"/>
  <circle cx="558" cy="90" r="0.8" fill="#b8ccee" opacity="0.45"/>

  <!-- Moon (crescent, slightly gibbous) -->
  <circle cx="175" cy="108" r="22" fill="#d8e8f8" opacity="0.82"/>
  <circle cx="183" cy="102" r="17" fill="#030b1c" opacity="0.96"/>

  <!-- Europe coastline silhouette in distance (very faint - across the Strait) -->
  <path d="M 0 480 Q 100 470 200 475 Q 350 465 500 472 Q 560 468 600 472 L 600 490 Q 500 486 350 480 Q 200 490 100 484 Q 50 482 0 488 Z" fill="#0c2040" opacity="0.55"/>

  <!-- Casbah on hill (left elevated) -->
  <polygon points="0,380 50,310 120,280 190,310 240,360 280,430 280,590 0,590" fill="#050c1a"/>
  <!-- Casbah walls and towers -->
  <rect x="55" y="288" width="130" height="50" fill="#060e20"/>
  <!-- Battlements -->
  <rect x="58" y="278" width="12" height="14" fill="#07102a"/>
  <rect x="78" y="278" width="12" height="14" fill="#07102a"/>
  <rect x="98" y="278" width="12" height="14" fill="#07102a"/>
  <rect x="118" y="278" width="12" height="14" fill="#07102a"/>
  <rect x="138" y="278" width="12" height="14" fill="#07102a"/>
  <rect x="158" y="278" width="12" height="14" fill="#07102a"/>
  <rect x="178" y="278" width="12" height="14" fill="#07102a"/>
  <!-- Casbah minaret / tower -->
  <rect x="102" y="230" width="18" height="60" fill="#07102a"/>
  <polygon points="98,232 124,232 111,210" fill="#091430"/>
  <!-- Casbah lights -->
  <circle cx="112" cy="305" r="2.5" fill="#5080d0" opacity="0.38"/>
  <circle cx="140" cy="298" r="2" fill="#5080d0" opacity="0.30"/>
  <circle cx="165" cy="302" r="2" fill="#5080d0" opacity="0.28"/>

  <!-- Medina slope -->
  <polygon points="280,430 360,480 400,510 420,590 280,590" fill="#060c1c"/>

  <!-- Port area (right) -->
  <!-- Port basin -->
  <rect x="380" y="530" width="220" height="80" fill="#04101e"/>
  <!-- Port jetty / breakwater -->
  <path d="M 420 540 Q 490 520 580 535 L 580 550 Q 490 534 420 554 Z" fill="#060e1a"/>
  <!-- Port cranes (industrial, minimal) -->
  <rect x="460" y="468" width="6" height="72" fill="#07102a"/>
  <rect x="445" y="470" width="21" height="5" fill="#07102a"/>
  <rect x="462" y="462" width="3" height="12" fill="#07102a"/>
  <rect x="510" y="475" width="6" height="65" fill="#07102a"/>
  <rect x="494" y="477" width="22" height="5" fill="#07102a"/>
  <rect x="512" y="470" width="3" height="10" fill="#07102a"/>
  <!-- Port lights -->
  <circle cx="448" cy="471" r="2.5" fill="#c08020" opacity="0.55"/>
  <circle cx="496" cy="478" r="2.5" fill="#c08020" opacity="0.50"/>
  <circle cx="535" cy="484" r="2.5" fill="#c08020" opacity="0.45"/>

  <!-- City buildings (center and right) -->
  <rect x="280" y="488" width="40" height="112" fill="#060d1e"/>
  <rect x="315" y="500" width="35" height="100" fill="#07101f"/>
  <rect x="345" y="478" width="38" height="122" fill="#060c1c"/>
  <rect x="378" y="490" width="32" height="110" fill="#07101e"/>
  <!-- Building lights -->
  <rect x="288" y="510" width="7" height="5" fill="#3060b0" opacity="0.28"/>
  <rect x="288" y="528" width="7" height="5" fill="#3060b0" opacity="0.22"/>
  <rect x="323" y="518" width="7" height="5" fill="#3060b0" opacity="0.25"/>
  <rect x="354" y="496" width="7" height="5" fill="#3060b0" opacity="0.28"/>
  <rect x="354" y="516" width="7" height="5" fill="#3060b0" opacity="0.22"/>
  <rect x="386" y="508" width="7" height="5" fill="#3060b0" opacity="0.25"/>

  <!-- Corniche boulevard lights (curved road along sea) -->
  <path d="M 260 590 Q 380 572 600 585" fill="none" stroke="#3068b0" stroke-width="2" opacity="0.30"/>
  <path d="M 260 598 Q 380 580 600 592" fill="none" stroke="#3068b0" stroke-width="1.2" opacity="0.18"/>
  <!-- Lamp posts along corniche -->
  <circle cx="300" cy="588" r="2.5" fill="#5090d8" opacity="0.40"/>
  <circle cx="350" cy="581" r="2.5" fill="#5090d8" opacity="0.38"/>
  <circle cx="400" cy="578" r="2.5" fill="#5090d8" opacity="0.38"/>
  <circle cx="450" cy="578" r="2.5" fill="#5090d8" opacity="0.35"/>
  <circle cx="500" cy="580" r="2.5" fill="#5090d8" opacity="0.35"/>
  <circle cx="550" cy="582" r="2.5" fill="#5090d8" opacity="0.32"/>

  <!-- Strait of Gibraltar -->
  <rect x="0" y="608" width="600" height="192" fill="url(#tg-sea)"/>

  <!-- Moon reflection on water -->
  <ellipse cx="175" cy="628" rx="35" ry="7" fill="#b0c8e8" opacity="0.10"/>
  <ellipse cx="175" cy="648" rx="20" ry="4" fill="#b0c8e8" opacity="0.07"/>

  <!-- Port lights reflection in water -->
  <ellipse cx="460" cy="625" rx="3" ry="12" fill="#c08020" opacity="0.12"/>
  <ellipse cx="510" cy="628" rx="3" ry="10" fill="#c08020" opacity="0.10"/>

  <!-- Wave lines -->
  <path d="M 0 640 Q 150 634 300 642 Q 450 650 600 640" fill="none" stroke="#162f60" stroke-width="1.2" opacity="0.22"/>
  <path d="M 0 672 Q 200 666 400 674 Q 500 678 600 670" fill="none" stroke="#162f60" stroke-width="1" opacity="0.16"/>
</svg>
