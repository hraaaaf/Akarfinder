name: OpenSERP Native Ingestion (GitHub-hosted)

# OPENSERP-GITHUB-NATIVE-INGESTION-INTEGRATION-1
# OPENSERP-CRON-PROD-ACTIVATION-1
# MASS-ACQUISITION-FREE-ACCELERATION-1
# Runs the EXISTING orchestrator (lib/openserp-ingestion/run-orchestrator.ts,
# via scripts/openserp/run-ingestion-github-actions.ts) inside a GitHub
# Actions job, talking to a local OpenSERP Docker container in full
# browser mode (validated by OPENSERP-GITHUB-EPHEMERAL-RUNTIME-POC-1) --
# no Vercel involved.
#
# P0 canonical-baseline rule: checkout follows the workflow's own ref. No
# Production or diagnostic workflow may hardcode a moving fix/feat/poc branch.
#
# Scheduled every 10 minutes. The adaptive runtime budget, engine suspension,
# global run lock and three production write flags remain authoritative, so a
# faster trigger never means overlapping or ungated writes.
#
# Guardrails against an accidental write:
#   - workflow_dispatch's mode still defaults to dry-run (never writes,
#     bypasses the flag gate)
#   - cron mode (both scheduled and manual) still requires
#     OPENSERP_AUTOMATED_INGESTION_ENABLED, OPENSERP_INGESTION_WRITE_ENABLED,
#     and OPENSERP_INGESTION_CRON_ENABLED to all be "true" secrets -- if
#     any is unset, the run safely NOOPs.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (never writes) or cron (mirrors Production gate exactly) -- ignored on a scheduled run, which always uses cron"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - cron

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout canonical workflow ref
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Confirm Node version
        run: node -v

      - name: Install dependencies
        run: npm ci

      - name: Prepare SearXNG settings (yandex only, fresh ephemeral secret key)
        run: |
          set -e
          SEARXNG_SECRET=$(openssl rand -hex 32)
          cat > /tmp/searxng-settings.yml <<YAML
          use_default_settings: true
          general:
            debug: false
            instance_name: "AkarFinder OpenSERP native ingestion (ephemeral)"
          search:
            safe_search: 0
            default_lang: "fr"
            formats:
              - html
              - json
          server:
            secret_key: "$SEARXNG_SECRET"
            limiter: false
            image_proxy: false
          outgoing:
            request_timeout: 8.0
          engines:
            - name: yandex
              engine: yandex
              disabled: false
          YAML

      - name: Start SearXNG
        run: |
          set -e
          docker run -d --name searxng -p 8888:8080 \
            -v /tmp/searxng-settings.yml:/etc/searxng/settings.yml:ro \
            searxng/searxng:latest

      - name: Wait for SearXNG JSON API
        run: |
          set -e
          STATUS="000"
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8888/search?q=test&format=json" || echo "000")
            if [ "$STATUS" = "200" ]; then echo "SearXNG ready"; break; fi
            sleep 2
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::SearXNG did not become ready (last status: $STATUS)"
            docker logs searxng --tail 300 || true
            exit 1
          fi

      - name: Confirm yandex is actually enabled (only engine this workflow ever requests)
        run: |
          curl -s "http://127.0.0.1:8888/config" > /tmp/searxng-config.json
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync("/tmp/searxng-config.json", "utf8"));
            const engines = config.engines || [];
            const e = engines.find((x) => x.name === "yandex");
            console.log("yandex ->", e ? JSON.stringify({ enabled: e.enabled }) : "NOT FOUND IN CONFIG");
          '

      - name: Start OpenSERP (full browser mode, no --raw)
        run: |
          set -e
          T0=$(date +%s%3N)
          docker pull karust/openserp:latest
          docker run -d --name openserp -p 7070:7070 \
            karust/openserp:latest serve -a 0.0.0.0 -p 7070
          T1=$(date +%s%3N)
          echo "openserp_start_ms=$((T1-T0))" >> "$GITHUB_ENV"

      - name: Wait for OpenSERP /health
        run: |
          set -e
          T0=$(date +%s%3N)
          STATUS="unknown"
          for i in $(seq 1 60); do
            BODY=$(curl -s -m 3 http://127.0.0.1:7070/health || true)
            STATUS=$(echo "$BODY" | grep -o '"status":"[a-z]*"' | head -1 | cut -d'"' -f4)
            if [ "$STATUS" = "healthy" ]; then break; fi
            sleep 1
          done
          T1=$(date +%s%3N)
          echo "openserp_health_wait_ms=$((T1-T0))" >> "$GITHUB_ENV"
          echo "--- /health ---"
          echo "$BODY"
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::OpenSERP did not report healthy within 60s"
            docker logs openserp --tail 200 || true
            exit 1
          fi

      - name: Confirm Bing/DuckDuckGo/Ecosia reachable (no ingestion writes)
        run: |
          set -e
          BODY=$(curl -s -m 5 http://127.0.0.1:7070/mega/engines)
          echo "$BODY"
          for e in bing duckduckgo ecosia; do
            if ! echo "$BODY" | grep -q "\"name\":\"$e\""; then
              echo "::warning::engine '$e' not listed in /mega/engines"
            fi
          done

      - name: Run ingestion entrypoint
        id: ingest
        env:
          OPENSERP_LOCAL_URL: http://127.0.0.1:7070
          OPENSERP_TRANSPORT: native
          PUBLIC_INDEX_POC_ENABLED: "true"
          OPENSERP_ASYNC_FEEDER_ENABLED: "true"
          OPENSERP_YANDEX_CHANNEL_ENABLED: "true"
          OPENSERP_SEARXNG_LOCAL_URL: http://127.0.0.1:8888
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENSERP_AUTOMATED_INGESTION_ENABLED: ${{ secrets.OPENSERP_AUTOMATED_INGESTION_ENABLED }}
          OPENSERP_INGESTION_WRITE_ENABLED: ${{ secrets.OPENSERP_INGESTION_WRITE_ENABLED }}
          OPENSERP_INGESTION_CRON_ENABLED: ${{ secrets.OPENSERP_INGESTION_CRON_ENABLED }}
        run: |
          set -e
          T0=$(date +%s%3N)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="cron"
          else
            MODE="${{ inputs.mode }}"
          fi
          npx tsx scripts/openserp/run-ingestion-github-actions.ts --"$MODE"
          T1=$(date +%s%3N)
          echo "ingest_ms=$((T1-T0))" >> "$GITHUB_ENV"

      - name: Timing summary
        if: always()
        run: |
          echo "openserp_start_ms=${{ env.openserp_start_ms }}"
          echo "openserp_health_wait_ms=${{ env.openserp_health_wait_ms }}"
          echo "ingest_ms=${{ env.ingest_ms }}"

      - name: Dump OpenSERP container logs (always, for diagnosis)
        if: always()
        run: docker logs openserp --tail 300 || true

      - name: Dump SearXNG container logs (always, for diagnosis)
        if: always()
        run: docker logs searxng --tail 300 || true

      - name: Stop OpenSERP
        if: always()
        run: docker rm -f openserp || true

      - name: Stop SearXNG
        if: always()
        run: docker rm -f searxng || true