name: Serper Mass Harvest Canary Report

on:
  pull_request:
    paths:
      - ".github/workflows/serper-mass-harvest-canary-report.yml"

permissions:
  contents: read
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Locate latest canary push run
        id: locate
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          run_json="$(gh api "repos/$GH_REPO/actions/workflows/serper-mass-harvest-canary.yml/runs?branch=feat%2Fserper-mass-harvest-implement-1&event=push&per_page=5")"
          run_id="$(printf '%s' "$run_json" | jq -r '.workflow_runs[0].id // empty')"
          status="$(printf '%s' "$run_json" | jq -r '.workflow_runs[0].status // empty')"
          conclusion="$(printf '%s' "$run_json" | jq -r '.workflow_runs[0].conclusion // empty')"
          head_sha="$(printf '%s' "$run_json" | jq -r '.workflow_runs[0].head_sha // empty')"
          test -n "$run_id" || { echo "No canary push run found"; exit 2; }
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "Canary run: id=$run_id status=$status conclusion=$conclusion head=$head_sha"

      - name: Wait briefly for canary completion
        if: steps.locate.outputs.status != 'completed'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            status="$(gh api "repos/$GH_REPO/actions/runs/$RUN_ID" --jq '.status')"
            conclusion="$(gh api "repos/$GH_REPO/actions/runs/$RUN_ID" --jq '.conclusion // ""')"
            echo "poll $i: status=$status conclusion=$conclusion"
            if [ "$status" = "completed" ]; then exit 0; fi
            sleep 10
          done
          echo "Canary did not complete within report wait window"
          exit 3

      - name: Print canary result or failure logs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          conclusion="$(gh api "repos/$GH_REPO/actions/runs/$RUN_ID" --jq '.conclusion // ""')"
          echo "Final canary conclusion: $conclusion"
          if [ "$conclusion" != "success" ]; then
            gh run view "$RUN_ID" --repo "$GH_REPO" --log-failed || true
            exit 4
          fi
          mkdir -p canary-artifact
          gh run download "$RUN_ID" --repo "$GH_REPO" -n serper-mass-harvest-canary -D canary-artifact
          echo "===== SERPER CANARY OUTPUT ====="
          cat canary-artifact/serper-canary-output.json
