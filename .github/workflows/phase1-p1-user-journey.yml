name: Phase 1 P1 User Journey Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  user-journey:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: User journey contracts
        run: npx tsx --test scripts/scrapers/__tests__/companion-revision-ux.test.ts scripts/scrapers/__tests__/mon-projet-workspace-ux.test.ts scripts/scrapers/__tests__/home-search-entry-orchestration-v1.test.ts

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Production build rehearsal
        run: npm run build
