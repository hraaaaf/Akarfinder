name: Data Funnel Replay Diagnostic (read-only)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Replay persisted discovery candidates without writes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/openserp/replay-discovery-funnel.ts --out=data-funnel-replay.json
      - name: Upload replay report
        uses: actions/upload-artifact@v4
        with:
          name: data-funnel-replay-report
          path: data-funnel-replay.json
