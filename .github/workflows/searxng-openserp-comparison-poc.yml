name: SearXNG vs OpenSERP Discovery POC (diagnostic only)

# SEARXNG-VS-OPENSERP-DISCOVERY-POC-1
# Isolated, read-only measurement POC. Deploys SearXNG and OpenSERP as
# ephemeral Docker containers, runs 100 benchmark queries against both, and
# applies the EXISTING (unmodified) AkarFinder admission pipeline offline
# to every raw result. No Supabase secrets used, no DB access of any kind,
# no business tables touched, no interaction with the production cron
# (openserp-github-native-ingestion.yml) or its schedule/lease/state.
# workflow_dispatch only, no schedule. Checks out the dedicated
# poc/searxng-vs-openserp-discovery branch (not the production cron
# branch) so this throwaway comparison tooling never mixes with it.

on:
  workflow_dispatch: {}

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout poc/searxng-vs-openserp-discovery
        uses: actions/checkout@v4
        with:
          ref: poc/searxng-vs-openserp-discovery

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Prepare SearXNG settings (fresh ephemeral secret key)
        run: |
          set -e
          SEARXNG_SECRET=$(openssl rand -hex 32)
          sed "s/REPLACED_AT_CONTAINER_START/$SEARXNG_SECRET/" scripts/searxng-poc/searxng-settings.yml > /tmp/searxng-settings.yml

      - name: Start SearXNG
        run: |
          set -e
          docker run -d --name searxng -p 8888:8888 \
            -v /tmp/searxng-settings.yml:/etc/searxng/settings.yml:ro \
            searxng/searxng:latest

      - name: Wait for SearXNG JSON API
        run: |
          set -e
          STATUS="000"
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8888/search?q=test&format=json" || echo "000")
            if [ "$STATUS" = "200" ]; then echo "SearXNG ready"; break; fi
            sleep 2
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::SearXNG did not become ready (last status: $STATUS)"
            docker logs searxng --tail 300 || true
            exit 1
          fi

      - name: Confirm candidate engines are actually enabled
        run: |
          curl -s "http://127.0.0.1:8888/config" > /tmp/searxng-config.json
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync("/tmp/searxng-config.json", "utf8"));
            const wanted = ["google", "duckduckgo", "brave", "startpage", "mojeek", "yandex", "qwant"];
            const engines = config.engines || [];
            for (const name of wanted) {
              const e = engines.find((x) => x.name === name);
              console.log(name, "->", e ? JSON.stringify({ enabled: e.enabled }) : "NOT FOUND IN CONFIG");
            }
          '

      - name: Start OpenSERP (full browser mode, no --raw)
        run: |
          set -e
          docker pull karust/openserp:latest
          docker run -d --name openserp -p 7070:7070 \
            karust/openserp:latest serve -a 0.0.0.0 -p 7070

      - name: Wait for OpenSERP /health
        run: |
          set -e
          STATUS="unknown"
          for i in $(seq 1 60); do
            BODY=$(curl -s -m 3 http://127.0.0.1:7070/health || true)
            STATUS=$(echo "$BODY" | grep -o '"status":"[a-z]*"' | head -1 | cut -d'"' -f4)
            if [ "$STATUS" = "healthy" ]; then break; fi
            sleep 1
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::OpenSERP did not report healthy within 60s"
            docker logs openserp --tail 200 || true
            exit 1
          fi

      - name: Run comparison (100 queries -- expect roughly 10-20 minutes)
        env:
          OPENSERP_LOCAL_URL: http://127.0.0.1:7070
          SEARXNG_URL: http://127.0.0.1:8888
          # Non-sensitive config, not secrets -- same async-feeder gate
          # flags already used by the native-transport workflow.
          PUBLIC_INDEX_POC_ENABLED: "true"
          OPENSERP_ASYNC_FEEDER_ENABLED: "true"
        run: npx tsx scripts/searxng-poc/run-comparison.ts

      - name: Dump container logs (always, for diagnosis)
        if: always()
        run: |
          echo "--- searxng ---"
          docker logs searxng --tail 200 || true
          echo "--- openserp ---"
          docker logs openserp --tail 200 || true

      - name: Stop containers
        if: always()
        run: |
          docker rm -f searxng || true
          docker rm -f openserp || true
